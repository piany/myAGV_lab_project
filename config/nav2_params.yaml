# config/nav2_params.yaml
# Nav2 configuration tuned for myAGV (mecanum drive, indoor lab)

amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2    # rotation noise from rotation
    alpha2: 0.2    # rotation noise from translation
    alpha3: 0.2    # translation noise from translation
    alpha4: 0.2    # translation noise from rotation
    base_frame_id:   base_footprint
    global_frame_id: map
    laser_model_type: likelihood_field
    max_particles: 2000
    min_particles: 500
    update_min_a: 0.10   # radians before particle update
    update_min_d: 0.10   # metres before particle update

bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    default_bt_xml_filename: "navigate_w_replanning_and_recovery.xml"

controller_server:
  ros__parameters:
    controller_plugins: ["FollowPath"]
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.25     # m/s  (conservative for lab)
      max_linear_accel:   0.50
      max_linear_decel:   0.50
      lookahead_dist:     0.40
      use_collision_detection: true

local_costmap:
  local_costmap:
    ros__parameters:
      width:        3
      height:       3
      resolution:   0.05
      robot_radius: 0.22           # myAGV footprint ≈ 220 mm
      inflation_layer:
        inflation_radius: 0.30

global_costmap:
  global_costmap:
    ros__parameters:
      resolution:   0.05
      robot_radius: 0.22

recoveries_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    recovery_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_recoveries/Spin"
    backup:
      plugin: "nav2_recoveries/BackUp"
    wait:
      plugin: "nav2_recoveries/Wait"
